services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: projects_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projects_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/projects_service?sslmode=disable
      JWT_SECRET: projects-service-secret
      ENABLE_DEMO_SEED: "true"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
